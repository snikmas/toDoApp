<html lang="en">
<head>

<body>
  <div id="form-div">
  <h1>Add a task</h1>
  <form action="/addTask" method="POST">
      <input type="text" name="task" id="addTask" placeholder="Your task"  required>
      <button id="add" type="submit"><img src="/image/add.png" alt="add"></button>
    </form>
  </div>


  <div id="allTasks">
    <h1>All tasks</h1>
    <div class="ul-container">
      <ul class="taskList">
        <li><div><input type="checkbox" class="taskDone" name="taskDone">Go out</div><button class="remove"><img src="/image/remove.png"></button></li>
        <li><div><input type="checkbox" class="taskDone" name="taskDone">Go out</div><button class="remove"><img src="/image/remove.png"></button></li>
        <li><div><input type="checkbox" class="taskDone" name="taskDone">Go out</div><button class="remove"><img src="/image/remove.png"></button></li>
      </ul>      
    </div>
  </div>
  

  <script src="script.js"></script>
</body>
</html>
